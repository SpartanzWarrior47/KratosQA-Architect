# Portfolio showcase — manual trigger only
# Auto-triggers disabled. Adapt to your project before enabling.
name: AutoFixerAgent
on:
  workflow_dispatch:
jobs:
  auto-fix:
    name: AutoFixerAgent — Safe Locator Fix
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Run AutoFixerAgent
        run: python .github/scripts/auto_fixer.py
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT:              ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          GITHUB_SERVER_URL:   ${{ github.server_url }}
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          ALLURE_RESULTS_DIR:  target/allure-results/merged
          AI_CLASSIFICATION:   L1
