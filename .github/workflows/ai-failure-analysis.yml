# ──────────────────────────────────────────────────────────────────────────────
# AI Failure Analysis — L1-L5 Root Cause Classification
# Triggers after every regression run
# ──────────────────────────────────────────────────────────────────────────────
name: AI Failure Analysis

on:
  workflow_run:
    workflows: [ "Full Regression Suite" ]
    types: [ completed ]

jobs:
  analyze:
    name: AI Failure Analysis
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Download Allure Results — Chromium
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          workflow: regression.yml
          name_is_regexp: true
          name: allure-results-chromium-.*
          path: target/allure-results/merged/
          if_no_artifact_found: warn

      - name: Download Allure Results — Firefox
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          workflow: regression.yml
          name_is_regexp: true
          name: allure-results-firefox-.*
          path: target/allure-results/merged/
          if_no_artifact_found: warn

      - name: Run BugAnalyzerAgent
        run: python .github/scripts/ai_failure_analysis.py
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GH_PAT:              ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          GITHUB_RUN_ID:       ${{ github.run_id }}
          GITHUB_SERVER_URL:   ${{ github.server_url }}
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
          SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
          N8N_WEBHOOK_URL:     ${{ secrets.N8N_WEBHOOK_URL }}
          ALLURE_RESULTS_DIR:  target/allure-results/merged
