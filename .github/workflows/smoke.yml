# Portfolio showcase — manual trigger only
# Auto-triggers disabled. Adapt to your project before enabling.
name: Smoke Tests
on:
  workflow_dispatch:
jobs:
  smoke:
    name: Smoke Tests — Chromium
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pom.xml') }}
      - name: Install Playwright
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      - name: Run Smoke Tests
        run: mvn test -Denv=ci -Dbrowser=chromium -Dheadless=true -Dgroups=smoke
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ github.run_number }}
          path: target/allure-results/
          retention-days: 7
