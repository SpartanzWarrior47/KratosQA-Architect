# Portfolio showcase — manual trigger only
# Auto-triggers disabled. Adapt to your project before enabling.
name: Test Intelligence Brain
on:
  workflow_dispatch:
jobs:
  update-brain:
    name: Update Intelligence Brain
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Update Test Intelligence Brain
        run: python .github/scripts/brain_updater.py
        env:
          GH_PAT:             ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_RUN_NUMBER:  ${{ github.run_number }}
          GITHUB_SHA:         ${{ github.sha }}
          ALLURE_RESULTS_DIR: target/allure-results/merged
          BROWSER:            both
